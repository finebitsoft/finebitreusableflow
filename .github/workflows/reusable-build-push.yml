name: "Reusable Build and Push"

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string

      context:
        required: false
        type: string
        default: .

      backend_path:
        required: false
        type: string

      frontend_path:
        required: false
        type: string

      # 🔥 STANDARDIZED ENV (ONLY dev | int | prod)
      frontend_env:
        required: false
        type: string
        default: dev

      frontend_base_href:
        required: false
        type: string
        default: /

      frontend_deploy_url:
        required: false
        type: string
        default: /

    secrets:
      docker_hub_username:
        required: true
      docker_hub_password:
        required: true
      jwt_private_key:
        required: true
      jwt_public_key:
        required: true

jobs:
  build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ----------------------------
      # FRONTEND BUILD
      # ----------------------------
      - name: Build Angular Frontend
        if: ${{ inputs.frontend_path != '' }}
        run: |
          cd ${{ inputs.frontend_path }}

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          # ----------------------------
          # VALIDATE ENV
          # ----------------------------
          FRONTEND_ENV="${{ inputs.frontend_env }}"

          if [[ "$FRONTEND_ENV" != "dev" && "$FRONTEND_ENV" != "int" && "$FRONTEND_ENV" != "prod" ]]; then
            echo "❌ Invalid FRONTEND_ENV=$FRONTEND_ENV (must be dev | int | prod)"
            exit 1
          fi

          echo "🚀 Building Angular frontend with ENV=$FRONTEND_ENV"

          npm run build -- --configuration=$FRONTEND_ENV \
            --base-href=${{ inputs.frontend_base_href }} \
            --deploy-url=${{ inputs.frontend_deploy_url }}

          # Copy build output to backend static folder
          if [ -n "${{ inputs.backend_path }}" ]; then
            echo "Copying frontend build to backend static folder"
            rm -rf ../${{ inputs.backend_path }}/src/main/resources/static/*
            cp -r dist/* ../${{ inputs.backend_path }}/src/main/resources/static/
          fi

      # ----------------------------
      # SETUP JAVA
      # ----------------------------
      - name: Set up JDK 21
        if: ${{ inputs.backend_path != '' }}
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ----------------------------
      # BACKEND BUILD
      # ----------------------------
      - name: Build Backend
        if: ${{ inputs.backend_path != '' }}
        run: |
          cd ${{ inputs.backend_path }}
          ./mvnw clean package -B -DskipTests
        env:
          JWT_PRIVATE_KEY: ${{ secrets.jwt_private_key }}
          JWT_PUBLIC_KEY: ${{ secrets.jwt_public_key }}

      # ----------------------------
      # DOCKER LOGIN
      # ----------------------------
      - name: Dockerhub Login
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/int') || startsWith(github.ref, 'refs/heads/hotfix/')
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.docker_hub_username }}
          password: ${{ secrets.docker_hub_password }}

      # ----------------------------
      # METADATA
      # ----------------------------
      - name: Extract metadata for Docker
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/int') || startsWith(github.ref, 'refs/heads/hotfix/')
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY }}/${{ inputs.image_name }}

      # ----------------------------
      # BUILD & PUSH IMAGE
      # ----------------------------
      - name: Build and Push Docker Image
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/int') || startsWith(github.ref, 'refs/heads/hotfix/')
        uses: docker/build-push-action@v4
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}